repos:
  - repo: local
    hooks:
      - id: backend-lint
        name: Backend Lint (ruff)
        language: system
        entry: bash -c 'cd backend && ruff check src/ tests/'
        types: [python]
        pass_filenames: false
      - id: backend-format
        name: Backend Format (ruff)
        language: system
        entry: bash -c 'cd backend && ruff format --check src/ tests/'
        types: [python]
        pass_filenames: false
